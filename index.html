<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Slimage — 在线图片智能压缩工具，纯浏览器端处理，保护隐私" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Slimage — 图片智能压缩</title>
    <script>
      // 在 React 渲染前同步设置主题，避免闪烁
      (function () {
        try {
          const key = "slimage-dark-mode";
          const stored = localStorage.getItem(key);
          const dark = stored ? stored === "true" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          // localStorage 不可用时保持默认浅色
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased transition-colors">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
